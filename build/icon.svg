<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b8cff"/>
      <stop offset="0.55" stop-color="#4c6ef5"/>
      <stop offset="1" stop-color="#3b5bdb"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1fb"/>
    </linearGradient>
    <filter id="bgshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#22356f" flood-opacity="0.30"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#1b2b66" flood-opacity="0.26"/>
    </filter>
  </defs>

  <!-- rounded-rectangle (squircle) background -->
  <g filter="url(#bgshadow)">
    <rect x="112" y="112" width="800" height="800" rx="186" ry="186" fill="url(#bg)"/>
  </g>

  <!-- document / paper -->
  <g filter="url(#shadow)">
    <rect x="320" y="282" width="384" height="466" rx="40" fill="url(#paper)"/>
  </g>

  <!-- markdown mark: M + down arrow -->
  <g fill="none" stroke="#4c6ef5" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
    <path d="M388 600 L388 446 L460 532 L532 446 L532 600"/>
    <path d="M628 446 L628 586"/>
    <path d="M584 540 L628 588 L672 540"/>
  </g>
</svg>
