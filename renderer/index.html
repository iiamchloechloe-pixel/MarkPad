<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https: file:; script-src 'self'">
<title>MarkPad</title>
<base id="docbase">
<link rel="stylesheet" href="../node_modules/@toast-ui/editor/dist/toastui-editor.css">
<link rel="stylesheet" href="../node_modules/@toast-ui/editor/dist/theme/toastui-editor-dark.css">
<link rel="stylesheet" href="../node_modules/katex/dist/katex.min.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="toolbar">
    <button class="tb icon" id="btn-toggle-sidebar" title="侧栏 (⌘\\)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>
    <span class="title">MarkPad</span>
    <span class="tb-sep"></span>
    <button class="tb icon" id="btn-new" title="新建 (⌘N)">
      <svg viewBox="0 0 24 24"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M14 2v5h5"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    </button>
    <button class="tb icon" id="btn-open" title="打开 (⌘O)">
      <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </button>
    <button class="tb icon" id="btn-save" title="保存 (⌘S)">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
    </button>
    <span class="spacer"></span>
    <button class="tb icon" id="btn-find" title="查找 / 替换 (⌘F)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="tb icon" id="btn-skin" title="编辑器主题">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
    </button>
    <button class="tb icon" id="btn-mode" title="切换源码 / 所见即所得">
      <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    </button>
    <button class="tb icon" id="btn-theme" title="外观">
      <svg viewBox="0 0 24 24"><path d="M12 8a2.83 2.83 0 0 0 4 4 4 4 0 1 1-4-4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.3 17.7-1.4 1.4"/><path d="m19.1 4.9-1.4 1.4"/></svg>
    </button>
  </div>

  <div class="body-row">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="side-tabs">
        <button class="side-tab active" data-tab="files">文件</button>
        <button class="side-tab" data-tab="outline">大纲</button>
      </div>
      <div class="side-content" id="files-panel">
        <div class="side-toolbar">
          <span id="folder-name" class="folder-name">未打开文件夹</span>
          <button class="tb icon sm" id="btn-new-file" title="在文件夹中新建" hidden>
            <svg viewBox="0 0 24 24"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M14 2v5h5"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          </button>
          <button class="tb icon sm" id="btn-refresh-tree" title="刷新" hidden>
            <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
          </button>
          <button class="tb sm" id="btn-open-folder">打开文件夹</button>
        </div>
        <div class="tree" id="tree"></div>
      </div>
      <div class="side-content" id="outline-panel" hidden>
        <div class="outline" id="outline"></div>
      </div>
    </aside>

    <!-- WYSIWYG editor -->
    <div class="main">
      <div class="findbar" id="findbar" hidden>
        <input id="find-input" placeholder="查找" autocomplete="off">
        <span class="find-count" id="find-count">0/0</span>
        <button class="tb sm" id="find-prev" title="上一个">▲</button>
        <button class="tb sm" id="find-next" title="下一个">▼</button>
        <label class="find-opt"><input type="checkbox" id="find-case"> Aa</label>
        <input id="replace-input" placeholder="替换为" autocomplete="off">
        <button class="tb sm" id="replace-one">替换</button>
        <button class="tb sm" id="replace-all">全部</button>
        <button class="tb sm" id="find-close" title="关闭 (Esc)">✕</button>
      </div>
      <div id="tui"></div>
    </div>
  </div>

  <div class="status">
    <span id="stat-words">0 字</span>
    <span id="stat-chars">0 字符</span>
    <span id="stat-read">0 分钟</span>
    <span style="flex:1"></span>
    <span id="stat-mode">所见即所得</span>
  </div>

  <div class="hint" id="hint"></div>

  <script src="vendor/toastui-editor.bundle.js"></script>
  <script src="../node_modules/katex/dist/katex.min.js"></script>
  <script src="../node_modules/katex/dist/contrib/auto-render.min.js"></script>
  <script src="../node_modules/marked/marked.min.js"></script>
  <script src="../node_modules/dompurify/dist/purify.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
